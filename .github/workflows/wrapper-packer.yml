name: 🏭 Wrap Image (Auto-Detect)

on:
  workflow_dispatch:
    inputs:
      base_image:
        description: 'Base Image (e.g., python:3.9, nginx:alpine)'
        required: true
        default: 'nginx:alpine'
      target_tag:
        description: 'Target Tag Name'
        required: true
        default: 'app-git-sync'

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # === 侦探模式：全量探测原镜像配置 ===
      - name: 🕵️ Detect Original Config
        id: detect
        run: |
          docker pull ${{ inputs.base_image }}
          
          # 1. 抓取原生 JSON 数组
          EP_JSON=$(docker inspect --format='{{json .Config.Entrypoint}}' ${{ inputs.base_image }})
          CMD_JSON=$(docker inspect --format='{{json .Config.Cmd}}' ${{ inputs.base_image }})
          
          # 2. 核心魔法：使用 jq 将 JSON 数组转换为 Bash 安全的强引用字符串！
          # 例如: ["/opt/my app/run.sh", "--foo"] 会变成 '"/opt/my app/run.sh" "--foo"'
          # 如果结果是 null，则输出空字符串
          EP=$(echo "$EP_JSON" | jq -r 'if type=="array" then map(@sh) | join(" ") else "" end')
          CMD=$(echo "$CMD_JSON" | jq -r 'if type=="array" then map(@sh) | join(" ") else "" end')
          
          # 3. 抓取 WorkDir
          WD=$(docker inspect --format='{{.Config.WorkingDir}}' ${{ inputs.base_image }})
          if [ -z "$WD" ]; then WD="/"; fi
          
          # 4. 检测上游镜像支持的平台
          echo "Detecting available platforms for ${{ inputs.base_image }}..."
          PLATFORMS=""
          
          if docker manifest inspect ${{ inputs.base_image }} | grep -q "linux/amd64\|amd64"; then
            PLATFORMS="linux/amd64"
          fi
          
          if docker manifest inspect ${{ inputs.base_image }} | grep -q "linux/arm64\|arm64"; then
            if [ -n "$PLATFORMS" ]; then
              PLATFORMS="$PLATFORMS,linux/arm64"
            else
              PLATFORMS="linux/arm64"
            fi
          fi
          
          if [ -z "$PLATFORMS" ]; then
            PLATFORMS="linux/amd64"
          fi
          
          echo "platforms=$PLATFORMS" >> $GITHUB_OUTPUT
          echo "entrypoint=$EP" >> $GITHUB_OUTPUT
          echo "cmd=$CMD" >> $GITHUB_OUTPUT
          echo "workdir=$WD" >> $GITHUB_OUTPUT
          
          echo "----------------------------------------"
          echo "Detected Entrypoint: [$EP]"
          echo "Detected CMD:        [$CMD]"
          echo "Detected WorkDir:    [$WD]"
          echo "Detected Platforms:  [$PLATFORMS]"
          echo "----------------------------------------"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: ${{ steps.detect.outputs.platforms }}
          # === 注入所有探测到的参数 ===
          build-args: |
            BASE_IMAGE=${{ inputs.base_image }}
            ORIGINAL_ENTRYPOINT=${{ steps.detect.outputs.entrypoint }}
            ORIGINAL_CMD=${{ steps.detect.outputs.cmd }}
            ORIGINAL_WORKDIR=${{ steps.detect.outputs.workdir }}
          tags: ghcr.io/${{ github.repository_owner }}/${{ inputs.target_tag }}:latest
