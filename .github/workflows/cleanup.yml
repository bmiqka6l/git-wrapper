name: 🧹 GHCR: cleanup old untagged images

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Delete untagged GHCR versions older than 7 days
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_FULL: ${{ github.repository }}
          REPO_OWNER: ${{ github.repository_owner }}
        shell: bash
        run: |
          set -Eeuo pipefail

          cutoff_epoch="$(date -u -d '7 days ago' +%s)"
          echo "Cutoff: $(date -u -d '7 days ago' '+%Y-%m-%dT%H:%M:%SZ')"

          owner_type="$(gh api "/users/${REPO_OWNER}" --jq '.type')"
          echo "Owner type: ${owner_type}"
          echo "Repo: ${REPO_FULL}"

          if [ "${owner_type}" = "Organization" ]; then
            list_packages_api="/orgs/${REPO_OWNER}/packages?package_type=container&per_page=100"
            versions_api_prefix="/orgs/${REPO_OWNER}/packages/container"
          else
            # 关键修复：用户命名空间用 authenticated user endpoint
            list_packages_api="/user/packages?package_type=container&per_page=100"
            versions_api_prefix="/user/packages/container"
          fi

          echo "List API: ${list_packages_api}"

          packages_json="$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              --paginate \
              "${list_packages_api}"
          )"

          # 只保留和当前 repo 绑定的包
          mapfile -t packages < <(
            printf '%s\n' "${packages_json}" | jq -r --arg repo "${REPO_FULL}" '
              .[]?
              | select((.repository.full_name // "") == $repo)
              | .name
            ' | sort -u
          )

          if [ "${#packages[@]}" -eq 0 ]; then
            echo "No GHCR container packages linked to ${REPO_FULL}"
            exit 0
          fi

          echo "Packages:"
          printf ' - %s\n' "${packages[@]}"

          deleted=0
          kept=0
          failed=0

          for pkg in "${packages[@]}"; do
            echo ""
            echo "=== Package: ${pkg} ==="

            versions_json="$(
              gh api \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                --paginate \
                "${versions_api_prefix}/${pkg}/versions?per_page=100"
            )"

            while IFS= read -r version_json; do
              [ -z "${version_json}" ] && continue

              version_id="$(jq -r '.id' <<<"${version_json}")"
              created_at="$(jq -r '.created_at' <<<"${version_json}")"
              created_epoch="$(date -u -d "${created_at}" +%s)"

              tags_count="$(jq -r '(.metadata.container.tags // []) | length' <<<"${version_json}")"
              tags_csv="$(jq -r '(.metadata.container.tags // []) | join(",")' <<<"${version_json}")"

              if [ "${tags_count}" -eq 0 ] && [ "${created_epoch}" -lt "${cutoff_epoch}" ]; then
                echo "Deleting untagged old version: id=${version_id} created_at=${created_at}"

                if gh api \
                  -X DELETE \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "${versions_api_prefix}/${pkg}/versions/${version_id}"
                then
                  deleted=$((deleted + 1))
                else
                  echo "Failed to delete version ${version_id}"
                  failed=$((failed + 1))
                fi
              else
                echo "Keeping version: id=${version_id} created_at=${created_at} tags=[${tags_csv}]"
                kept=$((kept + 1))
              fi
            done < <(printf '%s\n' "${versions_json}" | jq -c '.[]?')
          done

          echo ""
          echo "Done"
          echo "Deleted: ${deleted}"
          echo "Kept:    ${kept}"
          echo "Failed:  ${failed}"
